version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: procurement_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: "postgresql://postgres:password123@db:5432/procurement_system?schema=public"
      JWT_SECRET: "your_super_secret_production_key"
      NODE_ENV: production
    depends_on:
      - db

volumes:
  postgres_data:
